name: Package and push

on:
  push:
    branches:
      - main
    paths:
      - 'veracrypt.nuspec'
      - 'tools/**'
      - '.github/workflows/publish.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pack
        run: choco pack veracrypt.nuspec

      - name: Push
        env:
          CHOCO_API_KEY: ${{ secrets.CHOCO_API_KEY }}
        run: |
          choco apikey add --source "https://push.chocolatey.org/" --api-key "$env:CHOCO_API_KEY"
          $package = Get-ChildItem -Filter *.nupkg | Select-Object -First 1
          if (-not $package) {
            throw "No .nupkg file found to push."
          }
          choco push $package.FullName --source "https://push.chocolatey.org/"
