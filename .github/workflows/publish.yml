name: Package and push

on:
  push:
    branches:
      - main
    paths:
      - 'veracrypt.nuspec'
      - 'tools/**'
      - '.github/workflows/publish.yml'
  workflow_dispatch:

jobs:
  publish:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pack
        run: choco pack veracrypt.nuspec

      - name: Push
        env:
          CHOCO_API_KEY: ${{ secrets.CHOCO_API_KEY }}
        run: choco push --source "https://push.chocolatey.org/" --api-key "$env:CHOCO_API_KEY"
